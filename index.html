<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 工作状态</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }
        
        .house {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .room {
            width: 100%;
            max-width: 350px;
            height: 280px;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }
        
        .bedroom {
            background: linear-gradient(180deg, #2d1b4e 0%, #1a1035 100%);
            border: 3px solid #9d4edd;
        }
        
        .office {
            background: linear-gradient(180deg, #1a3a4a 0%, #0d2230 100%);
            border: 3px solid #00b4d8;
        }
        
        .room-label {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.9rem;
            font-weight: bold;
        }
        
        .bedroom .room-label { color: #dda0dd; }
        .office .room-label { color: #90e0ef; }
        
        .status {
            position: absolute;
            top: 35px;
            left: 50%;
            transform: translateX(-50%);
            padding: 4px 12px;
            border-radius: 10px;
            font-size: 0.75rem;
        }
        
        .bedroom .status {
            background: rgba(157, 78, 221, 0.3);
            color: #dda0dd;
        }
        
        .office .status {
            background: rgba(0, 180, 216, 0.3);
            color: #90e0ef;
        }
        
        .inactive { opacity: 0.3; }
        
        /* 小龙虾 */
        .crayfish {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 50px;
        }
        
        .cray-head {
            width: 35px;
            height: 25px;
            background: #ff6b6b;
            border-radius: 18px 18px 12px 12px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 0;
        }
        
        .cray-eye {
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 5px;
        }
        
        .cray-eye::after {
            content: '';
            width: 4px;
            height: 4px;
            background: #000;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
        }
        
        .cray-eye.l { left: 5px; }
        .cray-eye.r { right: 5px; }
        
        .cray-antenna {
            width: 2px;
            height: 15px;
            background: #ff8787;
            position: absolute;
            top: -12px;
            border-radius: 2px;
        }
        
        .cray-antenna.l { left: 10px; transform: rotate(-15deg); }
        .cray-antenna.r { right: 10px; transform: rotate(15deg); }
        
        .cray-body {
            width: 50px;
            height: 30px;
            background: linear-gradient(180deg, #ff6b6b 0%, #c92a2a 100%);
            border-radius: 25px 25px 18px 18px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 18px;
        }
        
        .cray-claw {
            width: 18px;
            height: 12px;
            background: #ff6b6b;
            border-radius: 8px;
            position: absolute;
            top: 22px;
        }
        
        .cray-claw.l { left: -5px; }
        .cray-claw.r { right: -5px; }
        
        .cray-tail {
            width: 35px;
            height: 12px;
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 2px;
            justify-content: center;
        }
        
        .cray-tail span {
            width: 8px;
            height: 12px;
            background: #ff6b6b;
            border-radius: 3px 3px 6px 6px;
        }
        
        /* 卧室装饰 */
        .moon {
            position: absolute;
            top: 60px;
            right: 30px;
            width: 30px;
            height: 30px;
            background: #ffe066;
            border-radius: 50%;
        }
        
        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #fff;
            border-radius: 50%;
        }
        
        .bed {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 35px;
            background: #e8d5b7;
            border-radius: 6px;
        }
        
        .pillow {
            position: absolute;
            bottom: 72px;
            left: 50%;
            transform: translateX(-50%);
            width: 35px;
            height: 18px;
            background: #fff;
            border-radius: 8px;
        }
        
        /* 办公室装饰 */
        .computer {
            position: absolute;
            bottom: 65px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 38px;
            background: #333;
            border-radius: 3px;
        }
        
        .screen {
            width: 42px;
            height: 28px;
            background: linear-gradient(180deg, #00d4ff 0%, #0077b6 100%);
            border-radius: 2px;
            margin: 4px auto;
        }
        
        .desk {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 140px;
            height: 45px;
            background: #8b5a2b;
            border-radius: 3px;
        }
        
        .lamp {
            position: absolute;
            bottom: 65px;
            right: 30px;
            width: 12px;
            height: 25px;
            background: #666;
        }
        
        .lamp::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -6px;
            width: 24px;
            height: 12px;
            background: #ffe066;
            border-radius: 3px 3px 0 0;
        }
        
        /* 底部信息 */
        .info {
            position: fixed;
            bottom: 10px;
            left: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            display: flex;
            justify-content: space-between;
        }
        
        .info span:first-child { color: #888; }
        .info span:last-child { color: #00d4ff; }
    </style>
</head>
<body>
    <h1>🤖 OpenClaw 工作状态</h1>
    
    <div class="house">
        <!-- 卧室 -->
        <div class="room bedroom" id="bedroom">
            <div class="room-label">🌙 卧室</div>
            <div class="status">😴 休息中</div>
            <div class="moon"></div>
            <div class="star" style="top:20px;left:25px"></div>
            <div class="star" style="top:40px;left:60px"></div>
            <div class="star" style="top:30px;left:120px"></div>
            <div class="pillow"></div>
            <div class="bed"></div>
            <div class="crayfish">
                <div class="cray-head">
                    <div class="cray-antenna l"></div>
                    <div class="cray-antenna r"></div>
                    <div class="cray-eye l"></div>
                    <div class="cray-eye r"></div>
                </div>
                <div class="cray-body">
                    <div class="cray-claw l"></div>
                    <div class="cray-claw r"></div>
                </div>
                <div class="cray-tail">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
        
        <!-- 办公室 -->
        <div class="room office" id="office">
            <div class="room-label">💼 办公室</div>
            <div class="status">💻工作中</div>
            <div class="computer"><div class="screen"></div></div>
            <div class="desk"></div>
            <div class="lamp"></div>
        </div>
    </div>
    
    <div class="info">
        <span>状态: <b id="status-text">检查中...</b></span>
        <span id="last-update">-</span>
    </div>

    <script>
        function checkStatus() {
            const hour = new Date().getHours();
            const isWorking = hour >= 9 && hour < 18;
            
            const bedroom = document.getElementById('bedroom');
            const office = document.getElementById('office');
            
            if (isWorking) {
                bedroom.classList.add('inactive');
                office.classList.remove('inactive');
                document.getElementById('status-text').textContent = '工作中 💻';
            } else {
                office.classList.add('inactive');
                bedroom.classList.remove('inactive');
                document.getElementById('status-text').textContent = '闲置中 😴';
            }
            
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString('zh-CN');
        }
        
        checkStatus();
        setInterval(checkStatus, 10000);
    </script>
</body>
</html>
